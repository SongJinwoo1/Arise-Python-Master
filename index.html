<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Tech | Level Up Your Reality</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-[100] glass border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center" id="main-nav">
        <div class="font-orbitron text-xl md:text-2xl font-bold tracking-tighter text-white">ARISE <span class="text-neonBlue">TECH</span></div>
        <div class="hidden md:flex gap-8 font-medium text-[10px] uppercase tracking-[0.3em] text-gray-400 items-center">
            <a href="#home">Home</a>
            <a href="#portfolio">Portfolio</a>
            <button id="install-btn-nav" class="install-btn-hidden items-center gap-2 bg-neonBlue/10 border border-neonBlue/40 text-neonBlue px-4 py-2 rounded-full">GET APP</button>
            <a href="#contact" class="text-white border-b border-neonBlue pb-1">Contact</a>
        </div>
        <button id="menu-btn" class="md:hidden text-white p-2"><i data-lucide="menu" id="menu-icon"></i></button>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[90] bg-black flex flex-col items-center justify-center gap-8 md:hidden">
        <a href="#home" class="menu-link font-orbitron text-2xl">HOME</a>
        <button id="install-btn-mobile" class="install-btn-hidden items-center gap-3 bg-neonBlue text-black px-8 py-3 rounded-full font-bold">Download App</button>
        <a href="#contact" class="menu-link font-orbitron text-2xl text-neonBlue">CONTACT</a>
    </div>

    <section id="home" class="relative min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="hero-mesh"></div>
        <h1 class="font-orbitron text-5xl md:text-9xl font-bold mb-6 tracking-tighter" data-aos="fade-up">ARISE <span class="text-gradient">TECH</span></h1>
        <p class="text-gray-400 uppercase tracking-widest mb-12" data-aos="fade-up" data-aos-delay="200">Level Up Your Reality</p>
        <a href="#portfolio" class="glow-button bg-gradient-to-r from-neonBlue to-electricPurple text-white px-12 py-5 rounded-2xl font-bold uppercase shadow-xl">Explore Projects</a>
    </section>

    <section id="portfolio" class="py-32 bg-[#020202]">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="font-orbitron text-3xl md:text-5xl font-bold mb-16 italic">_Portfolio</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="group relative overflow-hidden rounded-[2.5rem] glass" data-aos="fade-up">
                    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=800" class="w-full h-[450px] object-cover opacity-40 group-hover:opacity-100 transition duration-700">
                    <div class="absolute bottom-8 left-8 right-8">
                        <span class="text-[10px] text-neonBlue font-bold uppercase tracking-widest">Luxury Brand</span>
                        <h4 class="text-3xl font-bold mb-4 font-orbitron">Arij Perfumes</h4>
                        <a href="arij.html" class="bg-white text-black px-6 py-3 rounded-xl font-bold text-sm inline-block">View Live</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-32 px-6 max-w-4xl mx-auto">
        <div class="glass p-10 md:p-16 rounded-[3.5rem]" data-aos="fade-up">
            <h2 class="font-orbitron text-4xl text-center mb-10 text-white">Let's <span class="text-neonBlue italic">Connect.</span></h2>
            <form id="whatsappForm" class="space-y-8">
                <input type="text" id="name" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-neonBlue transition">
                <input type="text" id="subject" placeholder="Project Title" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-neonBlue transition">
                <button type="submit" class="w-full glow-button bg-white text-black font-bold py-6 rounded-2xl uppercase tracking-widest text-xs">Launch Connection</button>
            </form>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
